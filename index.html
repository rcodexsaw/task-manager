<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon"
        href="https://images.unsplash.com/photo-1499750310107-5fef28a66643?q=80&w=1170&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
        type="image/jpg">
</head>

<body>

    <div class="app-container">
        <header class="app-header">
            <h1>Task Manager</h1>
            <p>Track your daily tasks</p>
            <button id="theme-toggle-btn">🌓 Toggle Theme</button>
        </header>

        <section class="card form-section">
            <form id="task-form">
                <div class="form-grid">
                    <input type="text" id="task-input" placeholder="Task description..." required autocomplete="off">

                    <select id="task-category">
                        <option value="Work">Work</option>
                        <option value="Personal" selected>Personal</option>
                        <option value="Shopping">Shopping</option>
                    </select>

                    <input type="date" id="task-date" required>

                    <button type="submit" id="add-task-btn">Add Task</button>
                </div>
            </form>
        </section>

        <section class="card controls-section">
            <div class="controls-grid">
                <input type="text" id="search-input" placeholder="🔍 Search tasks by title...">
                <select id="filter-category">
                    <option value="all">All Categories</option>
                    <option value="Work">Work</option>
                    <option value="Personal">Personal</option>
                    <option value="Shopping">Shopping</option>
                </select>
                <button id="clear-all-btn">Clear All</button>
            </div>
        </section>

        <main class="task-board">
            <div class="task-column">
                <div class="column-header">
                    <h2>Pending Tasks</h2>
                    <span class="task-count" id="pending-count">0</span>
                </div>
                <div class="task-list" id="pending-container"></div>
            </div>

            <div class="task-column">
                <div class="column-header">
                    <h2>Completed</h2>
                    <span class="task-count" id="completed-count">0</span>
                </div>
                <div class="task-list" id="completed-container"></div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>

</html>
